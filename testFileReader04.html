<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        input[type=file] {
            display: none;
        }

        .myLabel {
            position: relative;
            display: inline-block;
            width: 100px;
            height: 100px;
            border: 2px solid #13a406;
            border-radius: 10px;
            overflow: hidden;

            .img {
                width: 100%;
                height: 100%;

                img {
                    width: 100%;
                    height: 100%;
                    object-fit: cover;
                }
            }

            .icon {
                position: absolute;
                right: 0;
                bottom: 0;
                width: 24px;
                height: 24px;
                background-color: #13a406;
                color: #fff;
                border-radius: 10px 0 0 0;
                display: flex;
                justify-content: center;
                align-items: center;
            }
        }

        .myLabel2 {
            display: block;
            display: flex;
            border: 1px solid #1bd902;
            border-radius: 5px;
            margin-bottom: 2px;


            div {
                &:nth-child(1) {
                    flex: 1;
                }

                &:nth-child(2) {
                    width: 100px;
                    background-color: #1bd902;
                    cursor: pointer;
                    user-select: none;
                    text-align: center;
                }
            }
        }
    </style>
    <title>客製化 flie input</title>
</head>

<body>
    <div>
        <label class="myLabel" for="myFile">
            <div class="img"></div>
            <i class="fa-solid fa-folder-plus icon"></i>
        </label>
        <input type="file" name="myFile" id="myFile" accept="image/*">
    </div>
    <button class="btn-add">加一個圖片欄位 + </button>
    <div class="container">
        <label class="myLabel2">
            <div>請選擇檔案...</div>
            <div>選擇檔案</div>
            <input type="file" id="myFile2">
        </label>
    </div>


    <script>
        const myFile = document.querySelector("#myFile");
        const myFile2s = document.querySelectorAll(".myLabel2 input");
        const btnAdd = document.querySelector(".btn-add");
        const container = document.querySelector(".container");

        myFile.addEventListener("change", e => {
            const file = e.target.files[0];
            const reader = new FileReader();

            reader.addEventListener("load", e => {
                const image = new Image();
                image.src = e.target.result;
                const img = document.querySelector(".myLabel .img");
                img.innerHTML = "";
                img.append(image);
            });

            reader.readAsDataURL(file);
        });

        myFile2s.forEach(myFile2 => {
            myFile2.addEventListener("change", e => {
                const file = e.target.files[0];
                console.log(file.name);
                console.log(e.target.closest(".myLabel2").querySelectorAll("div")[0]);
                e.target.closest(".myLabel2").querySelectorAll("div")[0].innerText = file.name
            });
        });

        btnAdd.addEventListener("click", () => {
            container.innerHTML += `<label class="myLabel2">
                                        <div>請選擇檔案...</div>
                                        <div>選擇檔案</div>
                                        <input type="file" id="myFile2">
                                    </label>`;
        });


    </script>
</body>

</html>
