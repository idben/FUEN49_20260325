<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        input[type=file] {
            display: none;
        }

        .myLabel {
            position: relative;
            display: inline-block;
            width: 100px;
            height: 100px;
            border: 2px solid #13a406;
            border-radius: 10px;
            overflow: hidden;

            .img {
                width: 100%;
                height: 100%;

                img {
                    width: 100%;
                    height: 100%;
                    object-fit: cover;
                }
            }

            .icon {
                position: absolute;
                right: 0;
                bottom: 0;
                width: 24px;
                height: 24px;
                background-color: #13a406;
                color: #fff;
                border-radius: 10px 0 0 0;
                display: flex;
                justify-content: center;
                align-items: center;
            }
        }
    </style>
    <title>客製化 flie input</title>
</head>

<body>
    <label class="myLabel" for="myFile">
        <div class="img"></div>
        <i class="fa-solid fa-folder-plus icon"></i>
    </label>
    <input type="file" name="myFile" id="myFile" accept="image/*">

    <script>
        const myFile = document.querySelector("#myFile");;

        myFile.addEventListener("change", e => {
            const file = e.target.files[0];
            const reader = new FileReader();

            reader.addEventListener("load", e => {
                const image = new Image();
                image.src = e.target.result;
                const img = document.querySelector(".myLabel .img");
                img.innerHTML = "";
                img.append(image);
            });

            reader.readAsDataURL(file);
        });
    </script>
</body>

</html>
