<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* * {
            box-sizing: border-box;
        } */

    #myInput {
      font-size: 24px;
      width: 100%;
      box-sizing: border-box;
    }

    .todo {
      display: flex;
      font-size: 24px;

      input {
        width: 20px;
      }

      label {
        user-select: none;
        display: inline-block;
        flex: 1;
      }

      &:hover {
        background-color: #dedede;
      }
    }
  </style>
  <title>待辦事項</title>
</head>

<body>
  <input id="myInput" type="text" placeholder="輸入待辦事項" autofocus>
  <div class="todolist">
    <!-- <div class="todo">
      <input id="todo1" type="checkbox">
      <label for="todo1">買爭鮮</label>
    </div> -->
  </div>

  <script>
    let todoAry;
    const myInput = document.querySelector("#myInput");
    const todolist = document.querySelector(".todolist");



    if (localStorage.getItem("todo")) {
      todoAry = JSON.parse(localStorage.getItem("todo"));
      todoAry.forEach(todo => setItem(todo));
    } else {
      todoAry = [];
    }

    // 對已經存在的 input 欄位有作用, 對新增的就沒作用了
    // const inputs = document.querySelectorAll("input[type=checkbox]");
    // console.log(inputs);

    // inputs.forEach(input => {
    //   input.addEventListener("change", () => {
    //     console.log("QQQ");
    //   });
    // });

    // 事件代理: 利用事件向上傳遞的特性, 
    // 在最上層容器做監測, 底層相同事件的觸發就抓得到
    todolist.addEventListener("change", e => {
      console.log(e.target.id);
      console.log(e.target.checked);
      todoAry.find(todo => todo.time == e.target.id).checked = e.target.checked;

      localStorage.setItem("todo", JSON.stringify(todoAry));
    });

    myInput.addEventListener("keyup", e => {
      if (e.key === "Enter" && e.ctrlKey == true) {
        const text = e.target.value;
        const time = "t" + new Date().getTime();
        const checked = false;
        const temObj = { time, text, checked };
        todoAry.push(temObj);
        localStorage.setItem("todo", JSON.stringify(todoAry));
        setItem(temObj);
        e.target.value = "";
      }
    });


    function setItem(obj) {
      todolist.innerHTML += `<div class="todo">
                                <input id="${obj.time}" type="checkbox" ${obj.checked == true ? "checked" : ""}>
                                <label for="${obj.time}">${obj.text}</label>
                              </div>`;
    }

  </script>
</body>

</html>
