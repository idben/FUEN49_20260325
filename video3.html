<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        video {
            width: 100%;
        }
    </style>
    <title>連續播放</title>
</head>

<body>
    <video id="player"></video>
    <button disabledd>開始</button>

    <script>
        const player = document.querySelector("#player");
        const btn = document.querySelector("button");
        const playList = [
            "./videos/video1.mp4",
            "./videos/video2.mp4",
            "./videos/video3.mp4",
            "./videos/video4.mp4",
        ];
        let playNum = 0;

        btn.addEventListener("click", () => {
            player.src = playList[playNum];
            player.play();
            btn.disabled = true;
        });

    </script>
</body>

</html>
