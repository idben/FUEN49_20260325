<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        html,
        body {
            height: 100dvh;
            min-height: 100dvh;
            padding: 0;
            margin: 0;
        }

        .bg {
            position: fixed;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            z-index: -1;

            video {
                width: 100%;
                height: 100%;
                object-fit: cover;
                filter: brightness(0.5);
            }
        }
    </style>
    <title>背景與全螢幕影片</title>
</head>

<body>
    <div class="bg">
        <video src="./videos/bg2.mp4" autoplay muted loop></video>
    </div>
</body>

</html>
